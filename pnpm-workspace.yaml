packages:
  - "apps/*"
  - "desktop"
  - "mobile"
  - "packages/*"
  - "crates/angel-engine-client-napi"
  - "!vendor/**"

nodeLinker: isolated
hoistPattern:
  - "*"
blockExoticSubdeps: false

peerDependencyRules:
  allowedVersions:
    "@electron-forge/plugin-fuses>@electron/fuses": "^2.1.1"

allowBuilds:
  "@electron/node-gyp": true
  "@google/genai": true
  "@parcel/watcher": true
  "@tailwindcss/oxide": true
  "better-sqlite3": true
  "electron": true
  "electron-winstaller": true
  "esbuild": true
  "fs-xattr": true
  "macos-alias": true
  "msgpackr-extract": true
  "msw": true
  node-pty: true
  "protobufjs": true
  "sharp": true
  "unrs-resolver": true

patchedDependencies:
  "@anthropic-ai/claude-agent-sdk@0.3.198": patches/@anthropic-ai__claude-agent-sdk@0.3.198.patch

overrides:
  "@babel/core": 7.29.7
  dompurify: 3.4.11
  hono: 4.12.25
  js-yaml: 5.1.0
  postcss: 8.5.10
  qs: 6.15.2
